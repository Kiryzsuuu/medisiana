# Nginx reverse proxy for Medisiana (Express + Socket.io on port 5000)
# Domain: medisiana.ailabs.or.id
#
# Install: sudo cp deploy/nginx-medisiana.conf /etc/nginx/sites-available/medisiana
#          sudo ln -s /etc/nginx/sites-available/medisiana /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see deploy/DEPLOY.md) to auto-upgrade this to HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name medisiana.ailabs.or.id;

    # Uploaded banner images are base64 in MongoDB (not files), but keep a
    # generous body size limit here too in case of future multipart routes.
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # Required for Socket.io (Study Room live chat) to work through the proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
