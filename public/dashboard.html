<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medisiana - Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="api.js"></script>
</head>
<body>

<div class="page">
  <div class="frame">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"><i class="ti ti-heart-plus" aria-hidden="true"></i></div>
        <div class="brand-name">Medi<span>siana</span></div>
      </div>

      <a href="chat.html"><button class="new-btn"><i class="ti ti-plus" aria-hidden="true"></i> Tanya Medina</button></a>

      <div class="nav-label">Menu</div>
      <nav class="nav-menu">
        <a href="home.html" class="nav-link"><i class="ti ti-home" aria-hidden="true"></i> Beranda</a>
        <a href="dashboard.html" class="nav-link active"><i class="ti ti-layout-grid" aria-hidden="true"></i> Dashboard</a>
        <a href="chat.html" class="nav-link"><i class="ti ti-robot" aria-hidden="true"></i> Medina AI</a>
        <a href="materi.html" class="nav-link"><i class="ti ti-books" aria-hidden="true"></i> Materi</a>
        <a href="quiz.html" class="nav-link"><i class="ti ti-pencil" aria-hidden="true"></i> Latihan Soal</a>
        <a href="rooms.html" class="nav-link"><i class="ti ti-users-group" aria-hidden="true"></i> Study Room</a>
        <a href="cases.html" class="nav-link"><i class="ti ti-stethoscope" aria-hidden="true"></i> Diskusi Kasus</a>
        <a href="wellness.html" class="nav-link"><i class="ti ti-heartbeat" aria-hidden="true"></i> Kesehatan Diri</a>
      </nav>

      <div class="nav-label" style="margin-top:10px">Akun</div>
      <nav class="nav-menu">
        <a href="profile.html" class="nav-link"><i class="ti ti-user-circle" aria-hidden="true"></i> Profil Saya</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="head">
        <div class="flex-1">
          <div class="head-title">Dashboard</div>
          <div class="head-sub" id="head-sub">Selamat belajar hari ini</div>
        </div>
        <div class="user-dropdown-wrap" id="user-dropdown-wrap"></div>
        <button class="icon-btn nav-toggle-btn"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
      </div>

      <div class="body">

        <p id="page-error" style="display:none;color:var(--red);font-size:12.5px;font-weight:600;margin-bottom:14px"></p>

        <!-- Stats -->
        <div class="grid grid-3 mb-22">
          <div class="stat">
            <div class="stat-ic sb-blue"><i class="ti ti-message-chatbot" aria-hidden="true"></i></div>
            <div class="stat-num" id="stat-sessions">-</div>
            <div class="stat-lbl">Sesi Belajar dengan Medina</div>
          </div>
          <div class="stat">
            <div class="stat-ic sb-purple"><i class="ti ti-users-group" aria-hidden="true"></i></div>
            <div class="stat-num" id="stat-rooms">-</div>
            <div class="stat-lbl">Study Room Diikuti</div>
          </div>
          <div class="stat">
            <div class="stat-ic sb-green"><i class="ti ti-stethoscope" aria-hidden="true"></i></div>
            <div class="stat-num" id="stat-cases">-</div>
            <div class="stat-lbl">Diskusi Kasus Tersedia</div>
          </div>
        </div>

        <!-- Two column -->
        <div class="col-main">
          <!-- Recent activity timeline -->
          <div class="card">
            <div class="card-head">
              <div class="card-title">Aktivitas Terakhir</div>
              <span class="chip chip-blue" id="timeline-count"></span>
            </div>
            <div id="activity-timeline">
              <div class="text-mut fs-13">Memuat...</div>
            </div>
          </div>

          <!-- Buku Tersedia -->
          <div class="card">
            <div class="card-head">
              <div class="card-title">Buku Tersedia</div>
              <span class="chip chip-gray" id="badge-book-count"></span>
            </div>
            <div id="books-list">
              <div class="text-mut fs-13">Memuat...</div>
            </div>
          </div>
        </div>

      </div>
    </div>



  </div>
</div>

<script>
const currentUser = requireAuth('student');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function initials(name) {
  return (name || '').split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
}

function timeAgo(dateStr) {
  const diffMs = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'baru saja';
  if (mins < 60) return `${mins} menit lalu`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} jam lalu`;
  return `${Math.floor(hours / 24)} hari lalu`;
}

if (currentUser) {
  document.getElementById('head-sub').textContent = currentUser.angkatan ? `Angkatan ${currentUser.angkatan}` : 'Selamat belajar hari ini';
  buildUserDropdown(currentUser);
}

const TIMELINE_ICON = {
  chat: ['sb-blue', 'ti-robot'],
  quiz: ['sb-amber', 'ti-pencil'],
  case: ['sb-purple', 'ti-stethoscope'],
};

function renderTimeline(items) {
  const container = document.getElementById('activity-timeline');
  document.getElementById('timeline-count').textContent = items.length ? `${items.length} aktivitas` : '';

  if (!items.length) {
    container.innerHTML = `
      <div class="empty" style="padding:30px 10px">
        <div class="empty-ic"><i class="ti ti-history" aria-hidden="true"></i></div>
        <div class="empty-title">Belum ada aktivitas</div>
        <div class="empty-sub">Mulai tanya Medina, latihan soal, atau post kasus untuk mengisi linimasa ini!</div>
      </div>`;
    return;
  }

  const html = items.map((item, i) => {
    const [iconClass, icon] = TIMELINE_ICON[item.type];
    return `
      <div class="timeline-item" style="animation-delay:${i * 0.05}s">
        <div class="timeline-marker">
          <div class="timeline-dot ${iconClass}"><i class="ti ${icon}" aria-hidden="true"></i></div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-content">
          <div class="timeline-row">
            <div class="flex-1">
              <div class="timeline-title"></div>
              <div class="timeline-sub"></div>
            </div>
            <div class="timeline-time">${timeAgo(item.date)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = `<div class="timeline">${html}</div>`;
  container.querySelectorAll('.timeline-title').forEach((el, i) => { el.textContent = items[i].title; });
  container.querySelectorAll('.timeline-sub').forEach((el, i) => { el.textContent = items[i].sub; });

  // Wrap in a link where relevant, without re-rendering (keeps the stagger animation intact)
  container.querySelectorAll('.timeline-content').forEach((el, i) => {
    if (items[i].href) {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => { window.location.href = items[i].href; });
    }
  });
}

async function loadDashboard() {
  const errorEl = document.getElementById('page-error');
  try {
    const [sessionsRes, roomsRes, casesRes, booksRes] = await Promise.all([
      apiFetch('/chat/sessions'),
      apiFetch('/rooms'),
      apiFetch('/cases'),
      apiFetch('/books'),
    ]);

    const sessions = sessionsRes.sessions;
    const cases = casesRes.cases;

    document.getElementById('stat-sessions').textContent = sessions.length;
    document.getElementById('stat-rooms').textContent = roomsRes.rooms.filter(r => (r.members || []).map(String).includes(String(currentUser.id))).length;
    document.getElementById('stat-cases').textContent = cases.length;

    const timelineItems = [
      ...sessions.map(s => ({
        type: s.mode === 'quiz' ? 'quiz' : 'chat',
        title: s.title,
        sub: s.mode === 'quiz' ? 'Latihan Soal dengan Medina' : 'Chat dengan Medina',
        date: s.updatedAt,
        href: s.mode === 'quiz' ? 'quiz.html' : 'chat.html',
      })),
      ...cases.filter(c => c.postedBy === currentUser.id || c.postedBy?._id === currentUser.id).map(c => ({
        type: 'case',
        title: c.title,
        sub: `Kamu memposting kasus · ${c.category || 'Umum'}`,
        date: c.createdAt,
        href: 'cases.html',
      })),
    ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 8);

    renderTimeline(timelineItems);

    const books = booksRes.books;
    document.getElementById('badge-book-count').textContent = `${books.length} buku`;
    const booksList = document.getElementById('books-list');
    if (!books.length) {
      booksList.innerHTML = '<div class="text-mut fs-13">Belum ada buku aktif untuk angkatanmu.</div>';
    } else {
      booksList.innerHTML = books.slice(0, 5).map(b => `
        <div class="row">
          <div class="row-ic sb-amber"><i class="ti ti-book-2" aria-hidden="true"></i></div>
          <div class="flex-1">
            <div class="row-main"></div>
            <div class="row-sub">${escapeHtml(b.category || '-')}${b.totalChunks ? ` · ${b.totalChunks.toLocaleString('id-ID')} chunks` : ''}</div>
          </div>
        </div>
      `).join('');
      booksList.querySelectorAll('.row-main').forEach((el, i) => { el.textContent = books[i].title; });
    }
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  }
}

loadDashboard();
</script>

</body>
</html>
